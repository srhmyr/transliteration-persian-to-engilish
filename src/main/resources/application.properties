# Application
server.port=8080
spring.application.name=transliteration-persian-to-engilish

# Data file location (place your .txt file here)
persian.dictionary.path=classpath:Persian_phonetics/persian_pronunciation.txt

# UTF-8 Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Logging
logging.level.com.example.persiantranslator=INFO
logging.level.org.springframework.web=INFO

# Caching
spring.cache.type=simple
spring.cache.cache-names=pronunciation-cache